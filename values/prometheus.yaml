# https://artifacthub.io/packages/helm/prometheus-community/prometheus
# ============================================
# Prometheus Server
# ============================================
server:
  enabled: true

  # Tempo metrics generatorк°Җ remote writeлЎң span л©”нҠёлҰӯ м „мҶЎ
  extraFlags:
    - web.enable-remote-write-receiver

  securityContext:
    runAsUser: 0
    runAsNonRoot: false
    runAsGroup: 0
    fsGroup: 0

  service:
    type: ClusterIP
    port: 9090

  persistentVolume:
    enabled: true
    storageClass: "standard"
    accessModes:
      - ReadWriteOnce
    size: 8Gi
    mountPath: /data

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - prometheus.drkube.local
      - prometheus-drkube.huik.site
    paths:
      - /
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus-drkube.huik.site

# ============================================
# Alertmanager
# ============================================
alertmanager:
  enabled: true

  persistence:
    enabled: true
    storageClass: "standard"
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    mountPath: /data

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: alert.drkube.local
        paths:
          - path: /
            pathType: Prefix
      - host: alert-drkube.huik.site
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alert-drkube.huik.site

  # Slack мӮ¬мҡ© мӢң: secret мғқм„ұ нӣ„ м•„лһҳ мЈјм„қ н•ҙм ң
  # kubectl create secret generic alertmanager-slack-webhook -n monitoring --from-literal=url=<SLACK_WEBHOOK_URL>
  # extraSecretMounts:
  #   - name: slack-webhook
  #     mountPath: /etc/alertmanager/secrets/slack-webhook
  #     secretName: alertmanager-slack-webhook
  #     readOnly: true

  # Alertmanager webhook м„Өм • (Slack лҜёмӮ¬мҡ© мӢң slack лқјмҡ°нҠёлҠ” nullлЎң м „лӢ¬)
  config:
    global:
      resolve_timeout: 5m
      # Slack мӮ¬мҡ© мӢң мЈјм„қ н•ҙм ң: slack_api_url_file: /etc/alertmanager/secrets/slack-webhook/url
    route:
      receiver: "null"
      group_by: ["alertname", "namespace", "pod"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h
      routes:
        - matchers:
            - severity="critical"
          receiver: "null"
          group_wait: 5s
          group_interval: 2m
          repeat_interval: 30m
          continue: true
        # Agent л№„мҡ© м ңм–ҙ: criticalл§Ң м Җл№ҲлҸ„лЎң мӣ№нӣ… м „лӢ¬
        - matchers:
            - severity="critical"
          receiver: "agent-critical"
          # ліөн•© мқёмӢңлҚҳнҠё мҲҳм§‘мқ„ мң„н•ҙ alertname/pod лӢЁмң„ л¶„лҰ¬лҘј мӨ„мһ„
          group_by: ["namespace", "severity"]
          group_wait: 90s
          group_interval: 10m
          repeat_interval: 6h
        # ArgoCD м•ұ м•ҢлҰј(OutOfSync/Degraded)лҸ„ Agent мӣ№нӣ…мңјлЎң м „лӢ¬
        - matchers:
            - alertname=~"ArgoCDApp.*"
          receiver: "agent-critical"
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 1h
        - matchers:
            - severity="warning"
          receiver: "null"
          group_wait: 15s
          group_interval: 10m
          repeat_interval: 2h
        - matchers:
            - severity="info"
          receiver: "null"
          group_wait: 1m
          group_interval: 30m
          repeat_interval: 6h
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["namespace", "pod"]
    receivers:
      # Agent м „мҡ© receiver (LLM л№„мҡ© м Ҳм•Ҫмқ„ мң„н•ҙ criticalл§Ң мӮ¬мҡ©)
      - name: "agent-critical"
        webhook_configs:
          - url: "http://dr-kube-agent.monitoring.svc.cluster.local:8080/webhook/alertmanager"
            send_resolved: false  # firingл§Ң л¶„м„қ
      # Slack мӮ¬мҡ© мӢң: secret мғқм„ұ нӣ„ receiverлҘј slackлЎң л°”кҫёкі  м•„лһҳ мЈјм„қ н•ҙм ң
      # - name: "slack"
      #   slack_configs:
      #     - channel: "#alert"
      #       send_resolved: true
      #       title: '{{ if eq .Status "firing" }}:fire: {{ .CommonLabels.alertname }}{{ else }}:white_check_mark: {{ .CommonLabels.alertname }} н•ҙкІ°{{ end }}'
      #       text: >-
      #         *{{ .CommonAnnotations.summary }}*
      #         {{ .CommonAnnotations.description }}
      #         *Namespace:* {{ .CommonLabels.namespace }}
      #         *Pod:* {{ .CommonLabels.pod }}
      - name: "null"

# ============================================
# Node Exporter (DaemonSet)
# ============================================
prometheus-nodeExporter:
  enabled: true

  service:
    type: ClusterIP
    port: 9100

  tolerations: []
  hostNetwork: false
  hostPID: false

  extraArgs: []
  podLabels: {}
  resources: {}

# ============================================
# Pushgateway (Off)
# ============================================
prometheus-pushgateway:
  enabled: false

# ============================================
# Prometheus Configuration
# ============================================
serverFiles:
  prometheus.yml:
    scrape_configs:
      # кё°ліё Prometheus self-scrape (мқҙлҰ„ ліҖкІҪ: кё°ліё chartмҷҖ мӨ‘ліө л°©м§Җ)
      # NOTE: Helm chart кё°ліёк°’м—җ мқҙлҜё prometheus jobмқҙ мһҲмңјлҜҖлЎң м ңкұ°
      # - job_name: "prometheus-self"
      #   static_configs:
      #     - targets: ["localhost:9090"]
      # Kube-State-Metrics мҠӨнҒ¬лһ©
      - job_name: "kube-state-metrics"
        static_configs:
          - targets:
              - "prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080"

      # Node Exporter мһҗлҸҷ мҠӨнҒ¬лһ©
      - job_name: "node-exporter"
        kubernetes_sd_configs:
          - role: endpoints

        relabel_configs:
          # 1) node-exporter м„ңл№„мҠӨл§Ң кіЁлқјмһЎкё°
          #    м„ңл№„мҠӨм—җ app.kubernetes.io/name=prometheus-node-exporter лқјлІЁмқҙ мһҲлӢӨкі  к°Җм •
          - source_labels:
              [__meta_kubernetes_service_label_app_kubernetes_io_name]
            regex: "prometheus-node-exporter"
            action: keep

          # 2) metrics нҸ¬нҠёл§Ң мӮ¬мҡ© (ліҙнҶө нҸ¬нҠё мқҙлҰ„мқҙ metrics лҳҗлҠ” http-metrics)
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: "metrics|http-metrics"
            action: keep

          # 3) node мқҙлҰ„мқ„ лқјлІЁлЎң л¶ҷмқҙкі  мӢ¶мңјл©ҙ (мҳөм…ҳ)
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: "node"

      # NGINX Ingress Controller л©”нҠёлҰӯ мҠӨнҒ¬лһ©
      - job_name: "nginx-ingress"
        static_configs:
          - targets:
              - "ingress-nginx-controller-metrics.ingress-nginx.svc.cluster.local:10254"

      # 3. cAdvisor (kubelet) нҶөн•ҙ Pod/м»Ён…Ңмқҙл„Ҳ л©”нҠёлҰӯ мҠӨнҒ¬лһ©
      - job_name: "cadvisor"
        scheme: https
        metrics_path: /metrics/cadvisor

        # к°Ғ Nodeмқҳ kubeletмқ„ API м„ңлІ„ proxyлЎң нғҖкі  к°ҖлҠ” нҢЁн„ҙ
        kubernetes_sd_configs:
          - role: node

        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true

        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        relabel_configs:
          # л…ёл“ң лқјлІЁмқ„ Prometheus лқјлІЁлЎң ліөмӮ¬
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

          # мӢӨм ң мҡ”мІӯмқҖ apiserverлЎң ліҙлӮҙкі ,
          # metrics_pathлЎң м–ҙлҠҗ л…ёл“ңмқём§Җ м§Җм • (proxy мӮ¬мҡ©)
          - target_label: __address__
            replacement: kubernetes.default.svc:443

          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      # OTel Collector span л©”нҠёлҰӯ (Grafana Drilldown Traces мҡ©)
      - job_name: "otel-spanmetrics"
        scrape_interval: 15s
        static_configs:
          - targets:
              - "otel-jaeger-forwarder.online-boutique.svc.cluster.local:9464"

      # ArgoCD Application Controller л©”нҠёлҰӯ (argocd_app_info: sync_status, health_status)
      - job_name: "argocd-application-controller"
        static_configs:
          - targets:
              - "argocd-application-controller-metrics.argocd.svc.cluster.local:8082"
  # ===========================================
  # alert rule м„Өм •
  # ============================================
  alerting_rules.yml:
    groups:
      - name: argocd-app.rules
        rules:
          - alert: ArgoCDAppDegraded
            expr: argocd_app_info{health_status="Degraded"} == 1
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "ArgoCD Application Health Degraded"
              description: |
                ArgoCD Application {{ $labels.name }} (namespace {{ $labels.namespace }})
                health_status is Degraded.

          - alert: ArgoCDAppOutOfSync
            expr: argocd_app_info{sync_status="OutOfSync"} == 1
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "ArgoCD Application OutOfSync"
              description: |
                ArgoCD Application {{ $labels.name }} (namespace {{ $labels.namespace }})
                sync_status is OutOfSync.

      - name: container-oom.rules
        rules:
          - alert: ContainerOOMKilled
            expr: |
              increase(kube_pod_container_status_restarts_total[5m]) >= 1
              and on (namespace, pod, container)
              max_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[5m]) == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Container OOMKilled л°ңмғқ"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} к°Җ
                мөңк·ј 5л¶„ лӮҙ OOMKilledлЎң мқён•ҙ мһ¬мӢңмһ‘лҗҳм—ҲмҠөлӢҲлӢӨ.

      - name: container-cpu.rules
        rules:
          - alert: CPUThrottling
            expr: |
              (
                sum by (namespace, pod, container) (
                  rate(container_cpu_cfs_throttled_periods_total{container!="",container!="POD"}[5m])
                )
                /
                clamp_min(
                  sum by (namespace, pod, container) (
                    rate(container_cpu_cfs_periods_total{container!="",container!="POD"}[5m])
                  ),
                  1
                )
              ) > 0.7
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU Throttling л°ңмғқ"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} к°Җ
                CPU throttling л№„мңЁ 70% мқҙмғҒмһ…лӢҲлӢӨ.

      - name: container-crash.rules
        rules:
          - alert: PodCrashLooping
            expr: |
              increase(kube_pod_container_status_restarts_total[10m]) >= 3
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod CrashLoopBackOff л°ңмғқ"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} к°Җ
                мөңк·ј 10л¶„ лӮҙ 3нҡҢ мқҙмғҒ мһ¬мӢңмһ‘лҗҳм—ҲмҠөлӢҲлӢӨ.
      - name: container-memory.rules
        rules:
          - alert: HighMemoryUsage
            expr: |
              (
                container_memory_working_set_bytes{container!="",container!="POD"}
                / container_spec_memory_limit_bytes{container!="",container!="POD"}
              ) > 0.92
              and on (namespace, pod, container)
              container_spec_memory_limit_bytes{container!="",container!="POD"} > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "л©”лӘЁлҰ¬ мӮ¬мҡ©лҹү мһ„кі„м№ҳ мҙҲкіј"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} мқҳ
                л©”лӘЁлҰ¬ мӮ¬мҡ©лҘ мқҙ 92%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

      - name: pod-ready.rules
        rules:
          - alert: PodNotReady
            expr: |
              kube_pod_status_ready{condition="true"} == 0
              and on (namespace, pod)
              kube_pod_status_phase{phase=~"Succeeded|Failed"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod Ready мғҒнғң м•„лӢҳ"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }} к°Җ
                Ready мғҒнғңк°Җ м•„лӢҷлӢҲлӢӨ.

      - name: container-waiting.rules
        rules:
          - alert: ContainerWaiting
            expr: |
              kube_pod_container_status_waiting_reason{
                reason=~"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError"
              } > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "м»Ён…Ңмқҙл„Ҳ лҢҖкё° мғҒнғң к°җм§Җ"
              description: |
                Pod {{ $labels.namespace }}/{{ $labels.pod }}
                м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} к°Җ
                лҢҖкё° мғҒнғңмһ…лӢҲлӢӨ. (reason={{ $labels.reason }})

      - name: deployment-replicas.rules
        rules:
          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas
              !=
              kube_deployment_status_replicas_available
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment л Ҳн”ҢлҰ¬м№ҙ л¶Ҳмқјм№ҳ"
              description: |
                Deployment {{ $labels.namespace }}/{{ $labels.deployment }} мқҳ
                spec_replicas мҷҖ available_replicas к°Җ мқјм№ҳн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.

      - name: node-cpu.rules
        rules:
          - alert: NodeHighCPU
            expr: |
              100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "л…ёл“ң CPU мӮ¬мҡ©лҘ  лҶ’мқҢ"
              description: |
                л…ёл“ң {{ $labels.instance }} мқҳ
                CPU мӮ¬мҡ©лҘ мқҙ 90%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

      - name: service-level.rules
        rules:
          - alert: ServiceHighLatencyP99
            expr: |
              histogram_quantile(
                0.99,
                sum by (le, service) (rate(traces_spanmetrics_latency_bucket[5m]))
              ) > 3
              and on (service)
              sum by (service) (rate(traces_spanmetrics_calls_total[5m])) > 0.2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "м„ңл№„мҠӨ м§Җм—° мҰқк°Җ (p99)"
              description: |
                м„ңл№„мҠӨ {{ $labels.service }} мқҳ p99 м§Җм—°мқҙ 3sлҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

          - alert: ServiceHighErrorRate
            expr: |
              (
                sum by (service) (rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m]))
                /
                sum by (service) (rate(traces_spanmetrics_calls_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "м„ңл№„мҠӨ м—җлҹ¬мңЁ мҰқк°Җ"
              description: |
                м„ңл№„мҠӨ {{ $labels.service }} мқҳ м—җлҹ¬мңЁмқҙ 5%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

          - alert: ServiceDown
            expr: |
              sum by (service) (rate(traces_spanmetrics_calls_total[5m])) == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "м„ңл№„мҠӨ лӢӨмҡҙ"
              description: |
                м„ңл№„мҠӨ {{ $labels.service }} м—җм„ң 10л¶„к°„ нҠёлһҳн”Ҫмқҙ к°җм§Җлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.

          - alert: UpstreamConnectionError
            expr: |
              (
                sum by (service, peer_service) (
                  rate(traces_spanmetrics_calls_total{span_kind="SPAN_KIND_CLIENT", status_code="STATUS_CODE_ERROR"}[5m])
                )
                /
                clamp_min(
                  sum by (service, peer_service) (
                    rate(traces_spanmetrics_calls_total{span_kind="SPAN_KIND_CLIENT"}[5m])
                  ),
                  0.1
                )
              ) > 0.2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "м—…мҠӨнҠёлҰј м—°кІ° мӢӨнҢЁ"
              description: |
                {{ $labels.service }} -> {{ $labels.peer_service }} м—…мҠӨнҠёлҰј м—°кІ° м—җлҹ¬мңЁмқҙ 20%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

      - name: nginx-ingress.rules
        rules:
          - alert: NginxHighLatency
            expr: |
              histogram_quantile(0.99, sum by (le) (rate(nginx_ingress_controller_request_duration_seconds_bucket[5m]))) > 7
              and sum(rate(nginx_ingress_controller_requests[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "NGINX Ingress м§Җм—° мҰқк°Җ (p99)"
              description: |
                NGINX Ingress мҡ”мІӯ p99 м§Җм—°мқҙ 5sлҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

          - alert: NginxHigh4xxRate
            expr: |
              sum(rate(nginx_ingress_controller_requests{status=~"4.."}[5m]))
              /
              sum(rate(nginx_ingress_controller_requests[5m]))
              > 0.20
              and sum(rate(nginx_ingress_controller_requests[5m])) > 1
            for: 10m
            labels:
              severity: info
            annotations:
              summary: "NGINX Ingress 4xx мҰқк°Җ"
              description: |
                NGINX Ingress 4xx л№„мңЁмқҙ 20%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

          - alert: NginxHigh5xxRate
            expr: |
              sum(rate(nginx_ingress_controller_requests{status=~"5.."}[5m]))
              /
              sum(rate(nginx_ingress_controller_requests[5m]))
              > 0.05
              and sum(rate(nginx_ingress_controller_requests[5m])) > 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "NGINX Ingress 5xx мҰқк°Җ"
              description: |
                NGINX Ingress 5xx л№„мңЁмқҙ 5%лҘј мҙҲкіјн–ҲмҠөлӢҲлӢӨ.

  # alerting_rules.yml:
  #   groups:
  #   - name: container-oom.rules
  #     rules:
  #       - alert: ContainerOOMKilled
  #         expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
  #         for: 1m
  #         labels:
  #           severity: critical
  #         annotations:
  #           summary: "Container OOMKilled л°ңмғқ"
  #           description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} м»Ён…Ңмқҙл„Ҳ {{ $labels.container }} к°Җ OOMKilled лҗҳм—ҲмҠөлӢҲлӢӨ."
