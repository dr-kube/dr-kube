# https://artifacthub.io/packages/helm/grafana/grafana

replicas: 1

resources:
  limits:
    memory: 1740Mi
  requests:
    memory: 768Mi

service:
  port: 80
  targetPort: 3000
  type: ClusterIP
  enabled: true

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.drkube.shop
  path: /
  pathType: Prefix

persistence:
  enabled: true
  storageClassName: csi-storageclass
  size: 10Gi

adminUser: admin
adminPassword: drkube

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server
        access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

defaultCurlOptions: "-skf"

dashboards:
  default:
    kubernetes-overview:
      gnetId: 315
      revision: 3
      datasource: Prometheus
    node-exporter:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    kubernetes-cluster-monitoring:
      gnetId: 7249
      revision: 1
      datasource: Prometheus
    kubernetes-pods:
      gnetId: 6417
      revision: 1
      datasource: Prometheus

grafana.ini:
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning
  analytics:
    check_for_updates: true
  log:
    mode: console
  grafana_net:
    url: https://grafana.net
  server:
    domain: "{{ if (and .Values.ingress.enabled .Values.ingress.hosts) }}{{ tpl (.Values.ingress.hosts | first) . }}{{ else }}''{{ end }}"