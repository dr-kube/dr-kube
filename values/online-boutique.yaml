# Google Online Boutique 데모 앱
# https://github.com/GoogleCloudPlatform/microservices-demo
# OCI Helm Chart: oci://us-docker.pkg.dev/online-boutique-ci/charts/onlineboutique

# ============================================
# OpenTelemetry → Jaeger 트레이싱
# ============================================
# create=true → 각 서비스에 COLLECTOR_SERVICE_ADDR 환경변수 설정
# collector 자체는 manifests/online-boutique/otel-collector.yaml 에서 배포
opentelemetryCollector:
  create: true

# tracing=true → 각 서비스에 ENABLE_TRACING=1 환경변수 설정
# (GCP 전용 기능이 아님, 트레이스 활성화 플래그)
googleCloudOperations:
  tracing: false
  profiler: false
  metrics: false

# ============================================
# Frontend
# ============================================
frontend:
  enabled: true
  replicas: 1
  image:
    tag: v0.10.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi # ← 에이전트가 수정할 대상 (OOMKilled 유발)
  livenessProbe:
    initialDelaySeconds: 30  # ← 앱 시작이 느릴 때 너무 짧으면 false kill
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5
  externalService: false
  service:
    type: ClusterIP
    port: 80

# ============================================
# Cart Service (Redis 기반인거 같음)
# ============================================
cartservice:
  enabled: true
  replicas: 1
  image:
    tag: v0.10.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: REDIS_ADDR
      value: "redis-cart:6379"
  service:
    type: ClusterIP
    port: 7070

# ============================================
# Product Catalog Service
# ============================================
productcatalogservice:
  enabled: true
  replicas: 1
  image:
    tag: v0.10.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  service:
    type: ClusterIP
    port: 3550

# ============================================
# Currency Service
# ============================================
currencyservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 7000

# ============================================
# Payment Service
# ============================================
paymentservice:
  enabled: true
  replicas: 1
  image:
    tag: v0.10.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: DISABLE_PROFILER
      value: "1"
    - name: PORT
      value: "8081"
  service:
    type: ClusterIP
    port: 8081

# ============================================
# Shipping Service
# ============================================
shippingservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 50051

# ============================================
# Email Service
# ============================================
emailservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 5000

# ============================================
# Checkout Service
# ============================================
checkoutservice:
  enabled: true
  replicas: 1
  image:
    tag: v0.10.1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: GRPC_TIMEOUT_MS
      value: "500"  # ← 너무 짧으면 downstream 서비스 timeout 유발
    - name: PAYMENT_SERVICE_ADDR
      value: "paymentservice:8081"
    - name: CART_SERVICE_ADDR
      value: "cartservice:7070"
  service:
    type: ClusterIP
    port: 5050

# ============================================
# Recommendation Service
# ============================================
recommendationservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 8080

# ============================================
# Ad Service
# ============================================
adservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 9555

# ============================================
# Redis (Cart 캐시)
# ============================================
redis:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 6379

# ============================================
# LoadGenerator (비활성화 - 수동 테스트)
# ============================================
loadgenerator:
  enabled: false # ← 수동 테스트를 위해 비활성화