# Google Online Boutique — 로컬 차트 values
# helm-chart/online-boutique/ 로컬 차트 사용 (원격 차트 대체)
# 이슈 다양성을 위해 probe, env, replicas, HPA, PDB 설정 포함

images:
  repository: us-central1-docker.pkg.dev/google-samples/microservices-demo
  tag: v0.10.4

opentelemetryCollector:
  create: true

googleCloudOperations:
  tracing: false
  profiler: false
  metrics: false

# ============================================
# Frontend  (HTTP — 사용자 직접 노출)
# ============================================
frontend:
  create: true
  name: frontend
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  extraEnv:
    - name: FRONTEND_REQUEST_TIMEOUT
      value: "10"
  livenessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

# ============================================
# Cart Service  (Redis 의존 — 세션 유지)
# ============================================
cartService:
  create: true
  name: cartservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: REDIS_CONNECT_TIMEOUT_MS
      value: "500"
    - name: REDIS_MAX_RETRIES
      value: "3"
  livenessProbe:
    grpc:
      port: 7070
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 7070
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Product Catalog Service
# ============================================
productCatalogService:
  create: true
  name: productcatalogservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: CATALOG_FETCH_TIMEOUT_MS
      value: "800"
    - name: MAX_CONCURRENT_REQUESTS
      value: "50"
  livenessProbe:
    grpc:
      port: 3550
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 3550
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# ============================================
# Currency Service
# ============================================
currencyService:
  create: true
  name: currencyservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: CURRENCY_TIMEOUT_MS
      value: "500"
  livenessProbe:
    grpc:
      port: 7000
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 7000
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Payment Service  (결제 — 가장 중요)
# ============================================
paymentService:
  create: true
  name: paymentservice
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: PAYMENT_GRPC_TIMEOUT_MS
      value: "2500"
    - name: MAX_PAYMENT_RETRIES
      value: "4"
  livenessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 30
    timeoutSeconds: 5       # 타이트 → CrashLoop 유발 가능
    periodSeconds: 10
    failureThreshold: 5     # 3회 실패 → 재시작 → 카스케이드 장애
  readinessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ============================================
# Shipping Service
# ============================================
shippingService:
  create: true
  name: shippingservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: SHIPPING_GRPC_TIMEOUT_MS
      value: "800"
  livenessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Email Service  (비동기 — SMTP 느림)
# ============================================
emailService:
  create: true
  name: emailservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: SMTP_TIMEOUT_SEC
      value: "5"
    - name: EMAIL_MAX_RETRIES
      value: "2"
  livenessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 5
  readinessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 5

# ============================================
# Checkout Service  (결제 오케스트레이터)
# ============================================
checkoutService:
  create: true
  name: checkoutservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv:
    - name: CHECKOUT_GRPC_TIMEOUT_MS
      value: "2000"
    - name: PAYMENT_SERVICE_TIMEOUT_MS
      value: "1500"
  livenessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

# ============================================
# Recommendation Service  (ML 모델 서빙)
# ============================================
recommendationService:
  create: true
  name: recommendationservice
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi         # ML 모델 로드 시 OOM 가능
  extraEnv:
    - name: RECOMMENDATION_MAX_RESULTS
      value: "5"
  livenessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    grpc:
      port: 8080
    failureThreshold: 9
    periodSeconds: 10

# ============================================
# Ad Service  (JVM 기반 — 느린 기동)
# ============================================
adService:
  create: true
  name: adservice
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv:
    - name: JAVA_TOOL_OPTIONS
      value: "-Xmx128m -Xms64m"
  livenessProbe:
    grpc:
      port: 9555
    initialDelaySeconds: 20
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 9555
    initialDelaySeconds: 20
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 3
  startupProbe:
    grpc:
      port: 9555
    failureThreshold: 12
    periodSeconds: 10

# ============================================
# Redis  (단일 장애점)
# ============================================
redis:
  create: true
  name: redis-cart
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ============================================
# LoadGenerator (비활성화)
# ============================================
loadGenerator:
  create: false
  name: loadgenerator