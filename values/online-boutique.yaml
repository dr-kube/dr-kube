# Google Online Boutique 데모 앱
# https://github.com/GoogleCloudPlatform/microservices-demo
# OCI Helm Chart: oci://us-docker.pkg.dev/online-boutique-ci/charts/onlineboutique

# ============================================
# OpenTelemetry → Jaeger 트레이싱
# ============================================
# create=true → 각 서비스에 COLLECTOR_SERVICE_ADDR 환경변수 설정
# collector 자체는 manifests/online-boutique/otel-collector.yaml 에서 배포
opentelemetryCollector:
  create: true

# tracing=true → 각 서비스에 ENABLE_TRACING=1 환경변수 설정
# (GCP 전용 기능이 아님, 트레이스 활성화 플래그)
googleCloudOperations:
  tracing: false
  profiler: false
  metrics: false

# ============================================
# Frontend
# ============================================
frontend:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi # ← 기존 64Mi에서 상향
    limits:
      cpu: 100m
      memory: 256Mi # ← 기존 128Mi에서 상향
  externalService: false
  service:
    type: ClusterIP
    port: 80
  livenessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 30 # ← 기존 10s에서 상향
    timeoutSeconds: 5       # ← 기존 1s에서 상향
    periodSeconds: 10
    failureThreshold: 5     # ← 기존 3에서 상향
  readinessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 30 # ← 기존 10s에서 상향
    timeoutSeconds: 5       # ← 기존 1s에서 상향
    periodSeconds: 10
    failureThreshold: 5     # ← 기존 3에서 상향

# ============================================
# Cart Service (Redis 기반인거 같음)
# ============================================
cartservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 7070

# ============================================
# Product Catalog Service
# ============================================
productcatalogservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 3550

# ============================================
# Currency Service
# ============================================
currencyservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 7000

# ============================================
# Payment Service
# ============================================
paymentservice:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 8081
  livenessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5
  readinessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 5
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ============================================
# Shipping Service
# ============================================
shippingservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 50051

# ============================================
# Email Service
# ============================================
emailservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 5000

# ============================================
# Checkout Service
# ============================================
checkoutservice:
  enabled: true
  replicas: 2 # ← 기존 1에서 증설
  resources:
    requests:
      cpu: 50m
      memory: 96Mi # ← 기존 64Mi에서 상향
    limits:
      cpu: 100m
      memory: 192Mi # ← 기존 128Mi에서 상향
  service:
    type: ClusterIP
    port: 5050
  livenessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 0
    timeoutSeconds: 5 # ← 기존 1s에서 상향
    periodSeconds: 10
    failureThreshold: 5 # ← 기존 3에서 상향
  readinessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 0
    timeoutSeconds: 5 # ← 기존 1s에서 상향
    periodSeconds: 10
    failureThreshold: 5 # ← 기존 3에서 상향

# ============================================
# Recommendation Service
# ============================================
recommendationservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 8080

# ============================================
# Ad Service
# ============================================
adservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 9555

# ============================================
# Redis (Cart 캐시)
# ============================================
redis:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 6379

# ============================================
# LoadGenerator (비활성화 - 수동 테스트)
# ============================================
loadgenerator:
  enabled: false # ← 수동 테스트를 위해 비활성화