# Google Online Boutique 데모 앱
# https://github.com/GoogleCloudPlatform/microservices-demo
# OCI Helm Chart: oci://us-docker.pkg.dev/online-boutique-ci/charts/onlineboutique

# ============================================
# OpenTelemetry → Tempo 트레이싱
# ============================================
opentelemetryCollector:
  create: true

googleCloudOperations:
  tracing: false
  profiler: false
  metrics: false

# ============================================
# Frontend  (HTTP 서비스 — 사용자 직접 노출)
# ============================================
frontend:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  externalService: false
  service:
    type: ClusterIP
    port: 80
  env:
    - name: FRONTEND_REQUEST_TIMEOUT
      value: "10"           # 초 단위, checkout/catalog 응답 대기 상한
    - name: ENABLE_PROFILER
      value: "0"
  livenessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /_healthz
      port: 8080
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: false          # OOM/고부하 시 HPA 활성화 검토
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# ============================================
# Cart Service  (Redis 의존 — 세션 유지 중요)
# ============================================
cartservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: REDIS_ADDR
      value: "redis-cart:6379"
    - name: REDIS_CONNECT_TIMEOUT_MS
      value: "500"          # Redis 연결 타임아웃 (ms)
    - name: REDIS_MAX_RETRIES
      value: "3"
  service:
    type: ClusterIP
    port: 7070
  livenessProbe:
    grpc:
      port: 7070
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 7070
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Product Catalog Service  (정적 카탈로그 로드)
# ============================================
productcatalogservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: CATALOG_FETCH_TIMEOUT_MS
      value: "800"          # 카탈로그 JSON 로드 타임아웃
    - name: MAX_CONCURRENT_REQUESTS
      value: "50"           # 동시 요청 상한
  service:
    type: ClusterIP
    port: 3550
  livenessProbe:
    grpc:
      port: 3550
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 3550
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

# ============================================
# Currency Service  (환율 변환 — 경량 서비스)
# ============================================
currencyservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: CURRENCY_TIMEOUT_MS
      value: "500"
  service:
    type: ClusterIP
    port: 7000
  livenessProbe:
    grpc:
      port: 7000
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 7000
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Payment Service  (결제 — 가장 중요한 서비스)
# ============================================
paymentservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: PAYMENT_GRPC_TIMEOUT_MS
      value: "1000"         # 외부 결제 API 호출 타임아웃
    - name: MAX_PAYMENT_RETRIES
      value: "2"
    - name: DISABLE_PROFILER
      value: "1"
  service:
    type: ClusterIP
    port: 8081
  livenessProbe:
    grpc:
      port: 8081
    initialDelaySeconds: 10
    timeoutSeconds: 2       # 타이트한 타임아웃 → CrashLoop 유발 가능
    periodSeconds: 10
    failureThreshold: 3     # 3회 실패 시 재시작 → 카스케이드 장애 원인
  readinessProbe:
    grpc:
      port: 8081
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  podDisruptionBudget:
    enabled: false          # 장애 시 minAvailable: 1 활성화 검토
    minAvailable: 1

# ============================================
# Shipping Service  (배송비 계산)
# ============================================
shippingservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: SHIPPING_GRPC_TIMEOUT_MS
      value: "800"
  service:
    type: ClusterIP
    port: 50051
  livenessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 50051
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3

# ============================================
# Email Service  (비동기 알림 — 느린 SMTP)
# ============================================
emailservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: SMTP_TIMEOUT_SEC
      value: "5"            # SMTP 연결 타임아웃
    - name: EMAIL_MAX_RETRIES
      value: "2"
    - name: DISABLE_PROFILER
      value: "1"
  service:
    type: ClusterIP
    port: 5000
  livenessProbe:
    grpc:
      port: 5000
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 5     # 비동기 서비스라 여유있게
  readinessProbe:
    grpc:
      port: 5000
    initialDelaySeconds: 10
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 5

# ============================================
# Checkout Service  (결제 오케스트레이터 — 여러 서비스 호출)
# ============================================
checkoutservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: CHECKOUT_GRPC_TIMEOUT_MS
      value: "2000"         # 하위 서비스 전체 호출 포함 타임아웃
    - name: PAYMENT_SERVICE_TIMEOUT_MS
      value: "1500"         # payment 전용 타임아웃
  service:
    type: ClusterIP
    port: 5050
  livenessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 5050
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

# ============================================
# Recommendation Service  (ML 모델 서빙 — 메모리 많이 씀)
# ============================================
recommendationservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi         # ML 모델 로드 시 OOM 가능
  env:
    - name: RECOMMENDATION_MAX_RESULTS
      value: "5"
    - name: DISABLE_PROFILER
      value: "1"
  service:
    type: ClusterIP
    port: 8080
  livenessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 15 # 모델 로드 시간 필요
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 8080
    initialDelaySeconds: 15
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:             # 모델 초기화 최대 90초 허용
    grpc:
      port: 8080
    failureThreshold: 9
    periodSeconds: 10

# ============================================
# Ad Service  (광고 서빙 — JVM 기반)
# ============================================
adservice:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi         # JVM heap 포함
  env:
    - name: PORT
      value: "9555"
    - name: JAVA_TOOL_OPTIONS  # JVM 힙 사이즈 명시 — OOM 시 조정 대상
      value: "-Xmx128m -Xms64m"
  service:
    type: ClusterIP
    port: 9555
  livenessProbe:
    grpc:
      port: 9555
    initialDelaySeconds: 20 # JVM 시작 시간
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    grpc:
      port: 9555
    initialDelaySeconds: 20
    timeoutSeconds: 3
    periodSeconds: 15
    failureThreshold: 3
  startupProbe:             # JVM cold start 최대 120초
    grpc:
      port: 9555
    failureThreshold: 12
    periodSeconds: 10

# ============================================
# Redis  (Cart 세션 저장소 — 단일 장애점)
# ============================================
redis:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  env:
    - name: REDIS_MAX_MEMORY
      value: "96mb"         # 메모리 한도 (limit보다 작게 유지)
    - name: REDIS_MAX_MEMORY_POLICY
      value: "allkeys-lru"
  service:
    type: ClusterIP
    port: 6379
  livenessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 10
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 5
    timeoutSeconds: 1
    periodSeconds: 5
    failureThreshold: 3

# ============================================
# LoadGenerator (비활성화 - 카오스 테스트로 대체)
# ============================================
loadgenerator:
  enabled: false
