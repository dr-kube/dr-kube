apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dr-kube-agent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dr-kube/dr-kube.git
    targetRevision: main
    path: charts/dr-kube-agent
    helm:
      valuesObject:
        existingSecret: dr-kube-agent-secrets
        image:
          repository: dr-kube-agent
          tag: local
          pullPolicy: Never
        autoPR: true
        llm:
          provider: copilot
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            nginx.ingress.kubernetes.io/ssl-redirect: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
