# Test Application: sync succeeds but Deployment never becomes Ready -> Health Degraded.
# ArgoCD sends on-health-degraded to agent. Delete after testing.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-webhook-test-degraded
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dr-kube/dr-kube.git
    targetRevision: main
    path: _test/argocd-health-degraded
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
