server {
    listen 80;

    # 정적 파일 (프론트엔드)
    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }

    # order-service API
    location ~ ^/(orders|health|metrics|simulate|docs|openapi.json) {
        proxy_pass http://order-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # menu-service API
    location ~ ^/(restaurants|menu) {
        proxy_pass http://menu-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # delivery-service API
    location /deliveries {
        proxy_pass http://delivery-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
