{{- if .Values.inventoryService.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: inventory-service
    {{- include "dr-kube-services.labels" . | nindent 4 }}
data:
  UPSTREAM_TIMEOUT_MS: {{ .Values.inventoryService.config.upstreamTimeoutMs | quote }}
  UPSTREAM_MAX_RETRIES: {{ .Values.inventoryService.config.upstreamMaxRetries | quote }}
  UPSTREAM_RETRY_BACKOFF_MS: {{ .Values.inventoryService.config.upstreamRetryBackoffMs | quote }}
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: {{ .Values.inventoryService.config.circuitBreakerFailureThreshold | quote }}
  CIRCUIT_BREAKER_RECOVERY_TIMEOUT_S: {{ .Values.inventoryService.config.circuitBreakerRecoveryTimeoutS | quote }}
  CIRCUIT_BREAKER_HALF_OPEN_MAX_CALLS: {{ .Values.inventoryService.config.circuitBreakerHalfOpenMaxCalls | quote }}
  CACHE_TTL_SECONDS: {{ .Values.inventoryService.config.cacheTtlSeconds | quote }}
  CACHE_MAX_SIZE: {{ .Values.inventoryService.config.cacheMaxSize | quote }}
  MAX_CONCURRENT_REQUESTS: {{ .Values.inventoryService.config.maxConcurrentRequests | quote }}
  REQUEST_QUEUE_SIZE: {{ .Values.inventoryService.config.requestQueueSize | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: inventory-service
    {{- include "dr-kube-services.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.inventoryService.replicas | default 1 }}
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        # ConfigMap 변경 시 Pod 재시작 트리거
        checksum/config: {{ toJson .Values.inventoryService.config | sha256sum }}
    spec:
      containers:
        - name: inventory-service
          image: {{ .Values.inventoryService.image.repository }}:{{ .Values.inventoryService.image.tag }}
          imagePullPolicy: {{ .Values.inventoryService.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: inventory-service-config
          resources:
            {{- toYaml .Values.inventoryService.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.inventoryService.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.inventoryService.readinessProbe | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: inventory-service
    {{- include "dr-kube-services.labels" . | nindent 4 }}
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8000
      targetPort: 8000
{{- end }}
