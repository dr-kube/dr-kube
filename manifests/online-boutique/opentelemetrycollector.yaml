# Online Boutique chart의 opentelemetrycollector 오버라이드
# 로컬 Kind 환경: GCP googlecloud exporter → Tempo otlp exporter로 교체
# init 컨테이너의 GCP 메타데이터 조회 제거 (로컬 환경에서 실패)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-gateway-config-template
  namespace: online-boutique
data:
  collector-gateway-config-template.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetrycollector
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentelemetrycollector
  template:
    metadata:
      labels:
        app: opentelemetrycollector
    spec:
      serviceAccountName: opentelemetrycollector
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: otel-gateway-init
          image: busybox:latest@sha256:e3652a00a2fabd16ce889f0aa32c38eec347b997e73bd09e69c962ec7f8732ee
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              cp /template/collector-gateway-config-template.yaml /conf/collector-gateway-config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: collector-gateway-config-template
              mountPath: /template
            - name: collector-gateway-config
              mountPath: /conf
      containers:
        - name: otel-gateway
          image: otel/opentelemetry-collector-contrib:0.139.0@sha256:faf125d656fa47cea568b2f3b4494efd2525083bc75c1e96038bc23f05cd68fd
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/collector-gateway-config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: collector-gateway-config
              mountPath: /conf
      volumes:
        - name: collector-gateway-config-template
          configMap:
            name: collector-gateway-config-template
            items:
              - key: collector-gateway-config-template.yaml
                path: collector-gateway-config-template.yaml
        - name: collector-gateway-config
          emptyDir: {}
