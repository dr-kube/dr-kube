apiVersion: apps/v1
kind: Deployment
metadata:
  name: menu-service
  namespace: delivery-app
  labels:
    app: menu-service
    app.kubernetes.io/part-of: delivery-app
  annotations:
    notifications.argoproj.io/subscribe.on-health-degraded.dr-kube: ""
    notifications.argoproj.io/subscribe.on-out-of-sync.dr-kube: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: menu-service
  template:
    metadata:
      labels:
        app: menu-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: menu-service
          image: delivery-app/menu-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi  # ← 에이전트가 수정할 대상 (OOMKilled 유발 가능)
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: menu-service
  namespace: delivery-app
  labels:
    app: menu-service
spec:
  selector:
    app: menu-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
