apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: delivery-app
  labels:
    app: order-service
    app.kubernetes.io/part-of: delivery-app
  annotations:
    notifications.argoproj.io/subscribe.on-health-degraded.dr-kube: ""
    notifications.argoproj.io/subscribe.on-out-of-sync.dr-kube: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: order-service
          image: delivery-app/order-service:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: MENU_SERVICE_URL
              value: "http://menu-service:8001"
            - name: DELIVERY_SERVICE_URL
              value: "http://delivery-service:8002"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi  # ← 에이전트가 수정할 대상 (OOMKilled 유발 가능)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: delivery-app
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
