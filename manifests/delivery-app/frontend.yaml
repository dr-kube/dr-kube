apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: delivery-app
  labels:
    app: frontend
    app.kubernetes.io/part-of: delivery-app
  annotations:
    notifications.argoproj.io/subscribe.on-health-degraded.dr-kube: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: delivery-app/frontend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: delivery-app
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
