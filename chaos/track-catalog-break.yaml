# 氤淀暕 韸鸽灆 2: catalog 鞛レ暊 + 鞐办噭 鞐愲煬
# productcatalog pod kill + frontend鈫抌ackend 雱ろ姼鞗岉伂 彀嫧
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-catalog-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: all
  duration: 5m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: productcatalogservice
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-catalog-network-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: all
  duration: 5m
  direction: both
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: currencyservice
  target:
    mode: all
    selector:
      namespaces:
        - online-boutique
      labelSelectors:
        app: frontend
