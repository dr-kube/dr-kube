# 복합 트랙 2: catalog 장애 + edge 과부하
# frontend DNS 오류 (모든 outbound 호출 실패) + network loss
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: track-catalog-dns-error
  namespace: chaos-mesh
spec:
  action: error
  mode: all
  duration: 5m
  patterns:
    - ".*"
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: frontend
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-catalog-network-loss
  namespace: chaos-mesh
spec:
  action: loss
  mode: all
  duration: 5m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: productcatalogservice
  loss:
    loss: "80"
    correlation: "25"
