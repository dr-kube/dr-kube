# 복합 트랙 2: catalog 장애 + 연쇄 에러
# productcatalog 지속 장애 + frontend→currencyservice 네트워크 차단
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-catalog-pod-failure
  namespace: chaos-mesh
spec:
  action: pod-failure
  mode: all
  duration: 5m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: productcatalogservice
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-catalog-network-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: all
  duration: 5m
  direction: both
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: currencyservice
  target:
    mode: all
    selector:
      namespaces:
        - online-boutique
      labelSelectors:
        app: frontend
