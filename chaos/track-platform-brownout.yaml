# 복합 트랙 3: 플랫폼 전반 브라운아웃
# 다중 서비스 패킷 손실 + DNS 장애 + pod kill로 광범위한 에러 유도
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-platform-network-loss
  namespace: chaos-mesh
spec:
  action: loss
  mode: all
  duration: 7m
  selector:
    namespaces:
      - online-boutique
    expressionSelectors:
      - key: app
        operator: In
        values:
          - paymentservice
          - redis-cart
          - currencyservice
  loss:
    loss: "60"
    correlation: "25"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: track-platform-dns-error
  namespace: chaos-mesh
spec:
  action: error
  mode: all
  duration: 7m
  patterns:
    - ".*"
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: checkoutservice
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-platform-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  duration: 3m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: recommendationservice
