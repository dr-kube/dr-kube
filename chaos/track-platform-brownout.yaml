# 복합 트랙 3: 플랫폼 전반 브라운아웃
# 다중 서비스 pod kill + 네트워크 차단으로 광범위한 에러 유도
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-platform-redis-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: all
  duration: 7m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: redis-cart
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-platform-recommendation-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: all
  duration: 5m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: recommendationservice
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-platform-payment-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: all
  duration: 7m
  direction: both
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: paymentservice
  target:
    mode: all
    selector:
      namespaces:
        - online-boutique
      expressionSelectors:
        - key: app
          operator: In
          values:
            - frontend
            - checkoutservice
