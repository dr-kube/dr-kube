# 복합 트랙 1: checkout 핵심 경로 연쇄 장애
# redis 패킷 손실 + payment 패킷 손실 + checkout pod kill
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-checkout-redis-loss
  namespace: chaos-mesh
spec:
  action: loss
  mode: all
  duration: 6m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: redis-cart
  loss:
    loss: "90"
    correlation: "25"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-checkout-payment-loss
  namespace: chaos-mesh
spec:
  action: loss
  mode: all
  duration: 6m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: paymentservice
  loss:
    loss: "70"
    correlation: "25"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-checkout-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  duration: 3m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: checkoutservice
