# 복합 트랙 1: checkout 핵심 경로 연쇄 장애
# redis pod kill + payment 네트워크 차단 + checkout pod kill
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-checkout-redis-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: all
  duration: 6m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: redis-cart
---
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: track-checkout-payment-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: all
  duration: 6m
  direction: both
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: paymentservice
  target:
    mode: all
    selector:
      namespaces:
        - online-boutique
      labelSelectors:
        app: checkoutservice
---
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: track-checkout-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  duration: 3m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: checkoutservice
