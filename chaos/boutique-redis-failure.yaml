# Chaos Mesh 실험: Redis 장애 -> 연쇄 실패
# 방법: Redis pod kill -> cartservice에서 Redis 연결 에러 발생
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: boutique-redis-failure
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: all
  duration: 3m
  selector:
    namespaces:
      - online-boutique
    labelSelectors:
      app: redis-cart
